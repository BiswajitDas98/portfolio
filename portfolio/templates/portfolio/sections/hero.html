{% if hero %}
<section id="hero" class="hero-exact">

    <div class="hero-content">

        <h1 class="hero-heading">
            {{ hero.title }}
        </h1>

        <p class="hero-roles">
            {{ hero.extra_data.roles }}
        </p>

        <p class="hero-subtitle">
            {{ hero.description }}
        </p>

        <a href="{{ hero.extra_data.button_link }}"
           class="btn hero-cta">
            {{ hero.extra_data.button_text }}
        </a>

    </div>

</section>
{% endif %}
