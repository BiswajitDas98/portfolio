{% if about %}
<section id="about" class="about-section">
    <div class="container" data-aos="fade-up">

        <div class="about-wrapper">

            <!-- LEFT IMAGE -->
            <div class="about-image">
                <div class="image-glow"></div>
                <img src="{{ about.extra_data.image }}" alt="{{ about.title }}">
            </div>

            <!-- RIGHT CONTENT -->
            <div class="about-content">
                {% comment %} <span class="about-tag">About Me</span> {% endcomment %}

                <h2>{{ about.title }}</h2>

                <p class="about-description">
                    {{ about.description }}
                </p>

                {% if about.extra_data.skills_summary %}
                <div class="skills-highlight">
                    <strong>Core Expertise:</strong>
                    {{ about.extra_data.skills_summary }}
                </div>
                {% endif %}

                {% if about.extra_data.resume_link %}
                <a href="{{ about.extra_data.resume_link }}" 
                   target="_blank" 
                   class="about-btn">
                    Download Resume →
                </a>
                {% endif %}

            </div>

        </div>
    </div>
</section>
{% endif %}
