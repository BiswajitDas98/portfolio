{% if skills %}
<section id="skills" class="py-5 bg-dark">
    <div class="container" data-aos="fade-up">
        <h2 class="text-center mb-4">My Skills</h2>
        <div class="row">
            {% for skill in skills %}
            <div class="col-md-6 mb-3">
                <h5>{{ skill.title }}</h5>
                <div class="progress" style="height: 20px;">
                    <div class="progress-bar bg-primary" role="progressbar" style="width: {{ skill.extra_data.percentage }}%;" aria-valuenow="{{ skill.extra_data.percentage }}" aria-valuemin="0" aria-valuemax="100">
                        {{ skill.extra_data.percentage }}%
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endif %}
